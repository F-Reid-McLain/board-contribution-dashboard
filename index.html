<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Board Participation — Choose Macon 2030</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <div class="container">
            <div class="logo">
                <span class="logo-main">CHOOSE MACON</span>
                <span class="logo-accent">2030</span>
            </div>
            <div class="header-label">Board Participation Tracker</div>
        </div>
    </header>

    <main class="main-content">
        <div class="container">

            <section class="page-header">
                <h2>Choose Macon 2030 Board Participation</h2>
            </section>

            <section class="stats-section">
                <div class="stats-grid">
                    <div class="stat-card">
                        <h4>Board Members</h4>
                        <div class="stat-value" id="stat-total">—</div>
                    </div>
                    <div class="stat-card">
                        <h4>Contributed</h4>
                        <div class="stat-value accent" id="stat-contributed">—</div>
                    </div>
                    <div class="stat-card">
                        <h4>Participation Rate</h4>
                        <div class="stat-value" id="stat-rate">—</div>
                    </div>
                    <div class="stat-card">
                        <h4>Individual Contributors</h4>
                        <div class="stat-value" id="stat-individual" style="color:#f59e0b;">—</div>
                    </div>
                </div>
            </section>

            <section class="dial-section">
                <div class="dial-card">
                    <div class="dial-wrapper">
                        <svg class="dial-svg" viewBox="0 0 300 188" aria-hidden="true">
                            <!-- Background track -->
                            <path id="dial-track"
                                  class="dial-track"
                                  d="M 20,160 A 130,130 0 0,1 280,160"
                                  fill="none"
                                  stroke-linecap="round"
                                  stroke-width="20"/>
                            <!-- Progress arc (org contributors) -->
                            <path id="dial-progress"
                                  class="dial-progress"
                                  d="M 20,160 A 130,130 0 0,1 280,160"
                                  fill="none"
                                  stroke-linecap="round"
                                  stroke-width="20"/>
                            <!-- Individual contributor arc (overlays start of progress arc) -->
                            <path id="dial-individual"
                                  class="dial-individual"
                                  d="M 20,160 A 130,130 0 0,1 280,160"
                                  fill="none"
                                  stroke-linecap="round"
                                  stroke-width="20"/>
                            <!-- Center labels -->
                            <text x="150" y="96" class="dial-pct-text" id="dial-pct-text">0%</text>
                            <text x="150" y="124" class="dial-sub-text">board participation</text>
                            <text x="150" y="140" class="dial-indiv-text" id="dial-indiv-text">0% individual</text>
                            <!-- End markers -->
                            <text x="20" y="182" class="dial-end-text" text-anchor="middle">0%</text>
                            <text x="280" y="182" class="dial-end-text" text-anchor="middle">100%</text>
                        </svg>
                        <div class="dial-legend">
                            <span class="legend-item">
                                <span class="legend-dot legend-dot--org"></span>
                                Org contributors
                            </span>
                            <span class="legend-item">
                                <span class="legend-dot legend-dot--individual"></span>
                                Individual contributors
                            </span>
                        </div>
                    </div>
                </div>
            </section>

            <section class="contributors-section">
                <h3>Contributing Organizations</h3>
                <div class="contributors-list" id="contributors-list"></div>
            </section>

        </div>
    </main>

    <script src="dashboard.js"></script>
</body>
</html>
